name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://app:app@localhost:5432/app_creator?schema=public
      SESSION_SECRET: ci-session-secret-not-for-production
      AUTH_MODE: dev
      AI_PROVIDER: mock
      AZURE_STORAGE_CONNECTION_STRING: UseDevelopmentStorage=true
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app_creator
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d app_creator"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Sync test database
        run: npm run db:push

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
