services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app_creator
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app_creator"]
      interval: 5s
      timeout: 5s
      retries: 20

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:3.34.0
    restart: unless-stopped
    command: "azurite-blob --blobHost 0.0.0.0 --blobPort 10000"
    ports:
      - "10000:10000"
    volumes:
      - azurite-data:/data

volumes:
  postgres-data:
  azurite-data:
