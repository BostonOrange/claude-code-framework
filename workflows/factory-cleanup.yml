# Factory Cleanup — Tear down ephemeral environments on PR close
# Triggered when any factory-labeled PR is closed (merged or not)
#
# Customize: Replace the cleanup step with your project's teardown command

name: Factory Cleanup

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup:
    name: Clean up ephemeral environment
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'factory')

    steps:
      # ── Identify environment ──────────────────────────────────

      - name: Determine environment ID
        id: env
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          echo "id=factory-pr-${PR_NUM}" >> "$GITHUB_OUTPUT"
          echo "Cleaning up environment for PR #${PR_NUM}"

      # ── Cleanup (uncomment your deployment target) ────────────

      # Vercel — delete preview deployment
