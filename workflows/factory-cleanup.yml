      #     npx vercel remove ${{ steps.env.outputs.id }} --token=${{ secrets.VERCEL_TOKEN }} --yes

      # Docker/K8s — delete namespace or deployment
      # - name: Delete K8s namespace
      #   run: |
      #     kubectl delete namespace ${{ steps.env.outputs.id }} --ignore-not-found

      # Salesforce — delete scratch org
      # - name: Delete scratch org
      #   run: |
      #     npm install -g @salesforce/cli
      #     echo "${{ secrets.SFDX_AUTH_URL_DEVHUB }}" > /tmp/devhub-auth.txt
      #     sf org login sfdx-url --sfdx-url-file /tmp/devhub-auth.txt -a devhub
      #     rm /tmp/devhub-auth.txt
      #     sf org delete scratch -o "${{ steps.env.outputs.id }}" -p devhub --no-prompt 2>/dev/null && \
      #       echo "Scratch org deleted." || \
      #       echo "Scratch org not found (may have already expired)."

      # AWS — delete CloudFormation stack
      # - name: Delete CF stack
      #   run: |
      #     aws cloudformation delete-stack --stack-name ${{ steps.env.outputs.id }}

      # Generic — run custom cleanup script
      # - name: Run cleanup script
      #   run: |
      #     bash scripts/cleanup-env.sh "${{ steps.env.outputs.id }}"

      - name: Log cleanup
        run: echo "Environment ${{ steps.env.outputs.id }} cleanup complete (or skipped — configure your cleanup step above)"
